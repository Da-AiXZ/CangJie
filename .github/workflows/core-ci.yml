name: Core CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-core:
    runs-on: windows-2022
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Verify App module import contracts
        run: python scripts/tests/test-app-module-import-contract.py
      - name: Install and audit pinned Swift toolchain
        shell: pwsh
        run: ./scripts/windows/install-swift-ci.ps1 -SwiftVersion 6.3.3
      - name: Strict Core tests and 90 percent line coverage gate
        shell: pwsh
        env:
          CANGJIE_SWIFTPM_SCRATCH: ${{ runner.temp }}\CangJieSwiftPM
        run: ./scripts/windows/test-core.ps1
