name: iPadOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.4"

jobs:
  simulator-tests:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Verify build identity and candidate-set contracts
        run: |
          python3 scripts/tests/test-generate-build-identity.py
          python3 scripts/tests/test-candidate-set-identity.py
          python3 scripts/tests/test-create-candidate-set-manifest.py
          python3 scripts/tests/test-verify-build-artifacts.py
          python3 scripts/tests/test-candidate-set-contract.py
          python3 scripts/tests/test-build-identity-contract.py
      - name: Static validation
        run: bash -n scripts/build-ipa.sh scripts/install-ldid.sh scripts/find-ipad-simulator.sh scripts/tests/test-install-ldid.sh scripts/tests/test-find-ipad-simulator.sh scripts/tests/test-build-ipa-contracts.sh scripts/tests/test-build-ipa-entitlements.sh
      - name: Test pinned ldid installer contract
        run: bash scripts/tests/test-install-ldid.sh
      - name: Test simulator selector failure handling
        run: bash scripts/tests/test-find-ipad-simulator.sh
      - name: Select pinned Xcode
        run: bash scripts/select-xcode.sh
      - name: Test signed entitlement extraction contract
        run: bash scripts/tests/test-build-ipa-entitlements.sh
      - name: Install pinned XcodeGen
        run: bash scripts/install-xcodegen.sh
      - name: Generate candidate-set identities before project generation
        id: identity
        run: |
          set -euo pipefail
          readonly marketing_version="1.0"
          readonly build_number="$(python3 scripts/candidate_set_identity.py build-version \
            --run-number "${GITHUB_RUN_NUMBER}" --run-attempt "${GITHUB_RUN_ATTEMPT:-1}")"
          readonly visible_commit="${GITHUB_SHA:0:12}"
          candidate_set_id="$(python3 scripts/candidate_set_identity.py candidate-set-id \
            --commit "${GITHUB_SHA}" --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT:-1}" --run-number "${GITHUB_RUN_NUMBER}" \
            --version "${marketing_version}" --build "${build_number}" --main-bundle-id com.juyang.CangJie \
            --probe-bundle-id com.juyang.CangJie.KeychainIsolationProbe)"
          python3 scripts/generate-build-identity.py \
            --role main \
            --bundle-id com.juyang.CangJie \
            --version "${marketing_version}" \
            --build "${build_number}" \
            --commit "${GITHUB_SHA}" \
            --candidate-set-id "${candidate_set_id}" \
            --swift-output App/CangJieApp/GeneratedBuildIdentity.swift \
            --c-output App/CangJieApp/GeneratedBuildIdentity.c \
            --metadata-output "$RUNNER_TEMP/CangJie-main-identity.json"
          python3 scripts/generate-build-identity.py \
            --role keychainIsolationProbe \
            --bundle-id com.juyang.CangJie.KeychainIsolationProbe \
            --version "${marketing_version}" \
            --build "${build_number}" \
            --commit "${GITHUB_SHA}" \
            --candidate-set-id "${candidate_set_id}" \
            --swift-output App/CangJieIsolationProbe/GeneratedBuildIdentity.swift \
            --c-output App/CangJieIsolationProbe/GeneratedBuildIdentity.c \
            --metadata-output "$RUNNER_TEMP/CangJie-probe-identity.json"
          main_fingerprint="$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1]))["fingerprint"])' "$RUNNER_TEMP/CangJie-main-identity.json")"
          probe_fingerprint="$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1]))["fingerprint"])' "$RUNNER_TEMP/CangJie-probe-identity.json")"
          echo "marketing_version=${marketing_version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "visible_commit=${visible_commit}" >> "$GITHUB_OUTPUT"
          echo "candidate_set_id=${candidate_set_id}" >> "$GITHUB_OUTPUT"
          echo "main_fingerprint=${main_fingerprint}" >> "$GITHUB_OUTPUT"
          echo "probe_fingerprint=${probe_fingerprint}" >> "$GITHUB_OUTPUT"
      - name: Generate project and stamp installed bundle identities
        run: |
          set -euo pipefail
          bash scripts/build-ipa.sh --verify-dependency-contract
          xcodegen generate --spec project.yml
          # XcodeGen owns these source plists and rewrites them during project generation.
          # Stamp only afterwards so Simulator-installed bundles match their executables.
          python3 scripts/stamp-build-identity.py --identity-json "$RUNNER_TEMP/CangJie-main-identity.json" --unstamped-build 1 App/Config/Info.plist
          python3 scripts/stamp-build-identity.py --identity-json "$RUNNER_TEMP/CangJie-probe-identity.json" --unstamped-build 1 App/Config/IsolationProbeInfo.plist
      - name: Resolve and verify revision-pinned packages
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project CangJie.xcodeproj \
            -scheme CangJie \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/CangJie-SourcePackages"
          bash scripts/build-ipa.sh --verify-resolved-packages \
            CangJie.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          bash scripts/build-ipa.sh --verify-grdb-privacy-manifest \
            "$RUNNER_TEMP/CangJie-SourcePackages/checkouts/GRDB.swift/GRDB/PrivacyInfo.xcprivacy"
          bash scripts/tests/test-build-ipa-contracts.sh \
            "$RUNNER_TEMP/CangJie-SourcePackages/checkouts/GRDB.swift/GRDB/PrivacyInfo.xcprivacy"

      - name: Select and boot an eligible iPad Simulator
        id: simulator
        env:
          SWIFTPM_CLONED_SOURCE_PACKAGES_DIR: ${{ runner.temp }}/CangJie-SourcePackages
        run: |
          set -euo pipefail
          udid="$(bash scripts/find-ipad-simulator.sh)"
          [[ "${udid}" =~ ^[0-9A-Fa-f]{8}-([0-9A-Fa-f]{4}-){3}[0-9A-Fa-f]{12}$ ]] || { echo "Simulator selection returned an invalid UDID" >&2; exit 1; }
          printf 'udid=%s\n' "${udid}" >> "$GITHUB_OUTPUT"
      - name: Test CangJie on iPad Simulator
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p TestResults
          xcodebuild test \
            -project CangJie.xcodeproj \
            -scheme CangJie \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -resultBundlePath TestResults/CangJie.xcresult \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/CangJie-SourcePackages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="-" \
            MARKETING_VERSION="${{ steps.identity.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.identity.outputs.build_number }}" \
            CANGJIE_GIT_COMMIT="${{ steps.identity.outputs.visible_commit }}" \
            CANGJIE_EXECUTABLE_FINGERPRINT="${{ steps.identity.outputs.main_fingerprint }}" \
            CANGJIE_CANDIDATE_SET_ID="${{ steps.identity.outputs.candidate_set_id }}"
      - name: Test Keychain Isolation Probe on iPad Simulator
        if: ${{ !cancelled() && steps.simulator.outputs.udid != '' }}
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p TestResults
          xcodebuild test \
            -project CangJie.xcodeproj \
            -scheme CangJieKeychainIsolationProbe \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -resultBundlePath TestResults/CangJieIsolationProbe.xcresult \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/CangJie-SourcePackages" \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="-" \
            MARKETING_VERSION="${{ steps.identity.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.identity.outputs.build_number }}" \
            CANGJIE_GIT_COMMIT="${{ steps.identity.outputs.visible_commit }}" \
            CANGJIE_EXECUTABLE_FINGERPRINT="${{ steps.identity.outputs.probe_fingerprint }}" \
            CANGJIE_CANDIDATE_SET_ID="${{ steps.identity.outputs.candidate_set_id }}"
      - name: Upload CangJie test result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: CangJie-iOS-TestResults
          path: TestResults/CangJie.xcresult
          if-no-files-found: warn
          retention-days: 7
      - name: Upload Keychain Isolation Probe test result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: CangJie-Keychain-Isolation-Probe-TestResults
          path: TestResults/CangJieIsolationProbe.xcresult
          if-no-files-found: warn
          retention-days: 7
      - name: Delete selected Simulator
        if: always() && steps.simulator.outputs.udid != ''
        run: xcrun simctl delete "${{ steps.simulator.outputs.udid }}" || echo "::warning::Unable to delete CI Simulator"
