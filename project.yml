name: CangJie
options:
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    iOS: "16.6"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.6
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
packages:
  CangJieCore:
    path: .
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    revision: 2cf6c756e1e5ef6901ebae16576a7e4e4b834622

targets:
  CangJie:
    type: application
    platform: iOS
    sources:
      - path: App/CangJieApp
      - path: App/Shared
    info:
      path: App/Config/Info.plist
    dependencies:
      - package: CangJieCore
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juyang.CangJie
        PRODUCT_NAME: CangJie
        TARGETED_DEVICE_FAMILY: 2
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: App/Config/CangJie.entitlements
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CANGJIE_GIT_COMMIT: local
        CANGJIE_EXECUTABLE_FINGERPRINT: local
        CANGJIE_CANDIDATE_SET_ID: local
  CangJieAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/CangJieAppTests
    dependencies:
      - target: CangJie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juyang.CangJie.tests
        GENERATE_INFOPLIST_FILE: YES
  CangJieUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/CangJieUITests
    dependencies:
      - target: CangJie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juyang.CangJie.uitests
        GENERATE_INFOPLIST_FILE: YES
  CangJieKeychainIsolationProbe:
    type: application
    platform: iOS
    sources:
      - path: App/CangJieIsolationProbe
      - path: App/Shared
    info:
      path: App/Config/IsolationProbeInfo.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juyang.CangJie.KeychainIsolationProbe
        PRODUCT_NAME: CangJieKeychainIsolationProbe
        TARGETED_DEVICE_FAMILY: 2
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: App/Config/CangJieIsolationProbe.entitlements
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CANGJIE_GIT_COMMIT: local
        CANGJIE_EXECUTABLE_FINGERPRINT: local
        CANGJIE_CANDIDATE_SET_ID: local
  CangJieIsolationProbeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/CangJieIsolationProbeTests
    dependencies:
      - target: CangJieKeychainIsolationProbe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juyang.CangJie.KeychainIsolationProbe.tests
        GENERATE_INFOPLIST_FILE: YES
  CangJieIsolationProbeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/CangJieIsolationProbeUITests
    dependencies:
      - target: CangJieKeychainIsolationProbe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juyang.CangJie.KeychainIsolationProbe.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  CangJie:
    build:
      targets:
        CangJie: all
        CangJieAppTests: [test]
        CangJieUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: CangJieAppTests
          parallelizable: false
        - name: CangJieUITests
          parallelizable: false
    run:
      config: Debug
    archive:
      config: Release
  CangJieKeychainIsolationProbe:
    build:
      targets:
        CangJieKeychainIsolationProbe: all
        CangJieIsolationProbeTests: [test]
        CangJieIsolationProbeUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: CangJieIsolationProbeTests
          parallelizable: false
        - name: CangJieIsolationProbeUITests
          parallelizable: false
    run:
      config: Debug
    archive:
      config: Release
